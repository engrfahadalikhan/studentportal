name: fahad1
description: "A new Flutter project connected to Firebase."

publish_to: 'none'  # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase dependencies (updated to match version compatibility)
  firebase_core: ^3.0.0  # firebase_core version 3.0.0 or above
  firebase_auth: ^5.7.0  # Updated firebase_auth to a compatible version
  cloud_firestore: ^5.0.0

  # Cupertino Icons for iOS style icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true